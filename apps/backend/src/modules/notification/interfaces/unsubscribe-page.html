<!--
  Feature 018 US1: minimal self-contained HTML template for the public unsubscribe flow.

  Supports three mutually-exclusive states by replacing the `data-state` attribute and
  hiding the other <section> blocks via inline CSS. The route handler decides which
  state to render and substitutes placeholders with values from the token payload.

  Placeholders (wrapped in {{ }}):
    - state           → "confirm" | "success" | "invalid" | "expired"
    - recipient       → email or phone
    - channel         → EMAIL | SMS | WHATSAPP (lowercase rendered)
    - tenantName      → agency name (optional; empty string if absent)
    - token           → the unsubscribe token (for the POST form)

  Interpolation is naive string replacement (no HTML escaping) — the route handler
  MUST escape user-controlled values before interpolation.
-->
<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Unsubscribe — Properfy</title>
    <style>
      body {
        font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif;
        background: #f5f5f7;
        color: #1d1d1f;
        margin: 0;
        padding: 0;
        min-height: 100vh;
        display: flex;
        align-items: center;
        justify-content: center;
      }
      .card {
        background: #fff;
        padding: 2.5rem 2rem;
        border-radius: 12px;
        max-width: 480px;
        width: 92%;
        box-shadow: 0 4px 20px rgba(0, 0, 0, 0.06);
      }
      h1 {
        font-size: 1.5rem;
        margin-top: 0;
        margin-bottom: 1rem;
      }
      p {
        line-height: 1.5;
        margin: 0.75rem 0;
      }
      .recipient {
        font-family: ui-monospace, 'SF Mono', Menlo, monospace;
        background: #f5f5f7;
        padding: 0.5rem 0.75rem;
        border-radius: 6px;
        display: inline-block;
      }
      button, .button {
        display: inline-block;
        padding: 0.75rem 1.5rem;
        border: none;
        border-radius: 8px;
        font-size: 1rem;
        font-weight: 500;
        cursor: pointer;
        margin-top: 1rem;
        text-decoration: none;
      }
      .button-primary {
        background: #0071e3;
        color: #fff;
      }
      .button-primary:hover {
        background: #0077ed;
      }
      .button-secondary {
        background: transparent;
        color: #0071e3;
      }
      .muted {
        color: #86868b;
        font-size: 0.875rem;
      }
      .error {
        color: #c62828;
      }
    </style>
  </head>
  <body>
    <main class="card" data-state="{{state}}">
      {{bodyHtml}}
    </main>
  </body>
</html>
