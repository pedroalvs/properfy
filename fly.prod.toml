app = 'properfy-prod'
primary_region = 'syd'

[build]
  dockerfile = 'apps/backend/Dockerfile'

[deploy]
  release_command = 'sh -lc "cd /app/apps/backend && prisma migrate deploy"'

[env]
  NODE_ENV = 'production'
  # Explicit pg-boss queue schema — authoritative, do NOT rely on NODE_ENV inference.
  PGBOSS_SCHEMA = 'pgboss'
  PORT = '3000'
  LOG_LEVEL = 'info'
  JWT_ACCESS_TOKEN_TTL_MINUTES = '60'

[http_service]
  internal_port = 3000
  force_https = true
  auto_stop_machines = 'stop'
  auto_start_machines = true
  min_machines_running = 1
  processes = ['app']

[[http_service.checks]]
  grace_period = '30s'
  interval = '30s'
  method = 'GET'
  timeout = '10s'
  path = '/ready'

[[vm]]
  size = 'shared-cpu-1x'
  memory = '512mb'
