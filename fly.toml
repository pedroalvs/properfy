app = 'properfy'
primary_region = 'iad'

[build]
  dockerfile = 'apps/backend/Dockerfile'

[deploy]
  release_command = 'echo "Skipping migration - manual migration pending"'

[env]
  NODE_ENV = 'staging'
  PORT = '3000'
  LOG_LEVEL = 'info'
  JWT_ACCESS_TOKEN_TTL_MINUTES = '60'

[http_service]
  internal_port = 3000
  force_https = true
  auto_stop_machines = 'stop'
  auto_start_machines = true
  min_machines_running = 1
  processes = ['app']

[[http_service.checks]]
  grace_period = '30s'
  interval = '30s'
  method = 'GET'
  timeout = '10s'
  path = '/ready'

[[vm]]
  size = 'shared-cpu-1x'
  memory = '512mb'
