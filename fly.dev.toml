# UNUSED BY CI — kept as local reference only.
# The CI workflows use fly.prod.toml (properfy-prod, syd) and fly.staging.toml (properfy, syd).
# Running `fly deploy` from the repo root without --config will pick this file and deploy
# to the wrong app/region. Use `fly deploy --config fly.prod.toml` or fly.staging.toml instead.
app = 'properfy'
primary_region = 'iad'

[build]
  dockerfile = 'apps/backend/Dockerfile'

[deploy]
  release_command = 'sh -c "cd /app/apps/backend && npx prisma migrate deploy"'

[env]
  NODE_ENV = 'staging'
  PORT = '3000'
  LOG_LEVEL = 'info'
  JWT_ACCESS_TOKEN_TTL_MINUTES = '60'

[http_service]
  internal_port = 3000
  force_https = true
  auto_stop_machines = 'stop'
  auto_start_machines = true
  min_machines_running = 1
  processes = ['app']

[[http_service.checks]]
  grace_period = '30s'
  interval = '30s'
  method = 'GET'
  timeout = '10s'
  path = '/ready'

[[vm]]
  size = 'shared-cpu-1x'
  memory = '512mb'
