# yaml-language-server: $schema=https://coderabbit.ai/integrations/schema.v2.json
#
# CodeRabbit configuration for Properfy.
# Governs BOTH the cloud CodeRabbit GitHub App (auto PR reviews) and the
# `coderabbit` CLI. Docs: https://docs.coderabbit.ai/getting-started/configure-coderabbit
#
# Reviews use the "assertive" profile (thorough). Switch to "chill" for fewer,
# higher-signal comments.

language: "en-US"

reviews:
  # "assertive" = more thorough, more nitpicks; "chill" = signal over noise.
  profile: "assertive"
  # Don't formally block merges with a "request changes" review; comment instead.
  request_changes_workflow: false
  high_level_summary: true
  review_status: true
  collapse_walkthrough: false
  poem: false

  auto_review:
    enabled: true
    drafts: false # skip draft PRs
    # Auto-review PRs to any base branch (base_branches accepts regex; ".*" = all).
    base_branches:
      - ".*"

  # Skip generated / vendored / lock files — reviewing these is pure noise.
  path_filters:
    - "!**/node_modules/**"
    - "!**/dist/**"
    - "!pnpm-lock.yaml"
    - "!packages/shared/src/api-types.ts" # generated by openapi-typescript from openapi.json
    - "!packages/shared/openapi.json" # generated from backend routes
    - "!apps/backend/prisma/migrations/**" # generated SQL migrations
    - "!.claude/**" # local worktrees, agents, memory

  # Project-specific guidance per area, mirrored from CLAUDE.md so the App reviews
  # against Properfy conventions instead of giving generic advice.
  path_instructions:
    - path: "apps/backend/**"
      instructions: >-
        Clean Architecture: domain has no external dependencies; application
        orchestrates; infrastructure implements ports. Enforce multi-tenant safety:
        every business query and repository must be scoped by tenant_id (no business
        query without tenant scope). Validate all API payloads with Zod. Appointment
        state-machine transitions must register an audit log and validate actor RBAC;
        sensitive transitions require a reason. Apply idempotency on critical commands
        (acceptance, execution, financial entries). Flag any tenant_id WHERE filter not
        covered by a Postgres-real integration test (mocks can hide tenant-scope bugs).
    - path: "apps/web/**"
      instructions: >-
        React + TypeScript + Tailwind. Reuse design-system primitives
        (FilterSelect / FilterMultiSelect / FilterBar / DataTable) instead of raw HTML
        for filters and tables. Never expose raw IDs in the UI — show readable fields
        (e.g. number + address + status + date). DataTable sorts client-side via useMemo;
        do not send sortBy/sortOrder to the API. List pages must show data immediately;
        selectors filter, they do not gate.
    - path: "apps/pwa/**"
      instructions: >-
        Inspector PWA (React + Vite + Tailwind). Reuse the shared design-system
        primitives and keep parity with the web portal conventions.
    - path: "packages/shared/**"
      instructions: >-
        Source of truth for shared Zod schemas, types and enums consumed across
        workspaces. api-types.ts is generated from openapi.json — it must never be
        hand-edited; regenerate via the generate:types script instead.
    - path: "**/*.{test,spec}.{ts,tsx}"
      instructions: >-
        TDD is mandatory. Tests must cover behavior (red-green-refactor), including
        tenant-scope filters asserted against a real Postgres, since mocks return
        regardless of the tenant_id argument and can mask isolation bugs.

chat:
  auto_reply: true
